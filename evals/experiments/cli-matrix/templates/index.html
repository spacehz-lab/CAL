<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CAL CLI Matrix</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:32px;color:#202124;background:#fff}
table{border-collapse:collapse;width:100%;font-size:14px}
th,td{border-bottom:1px solid #ddd;padding:8px;text-align:left;vertical-align:top}
th{background:#f6f7f8}
.ok{color:#137333;font-weight:600}.fail{color:#b3261e;font-weight:600}.muted{color:#5f6368}
code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0}.card{border:1px solid #ddd;border-radius:6px;padding:10px 12px;min-width:130px}
details{margin-top:6px}
pre{background:#f6f7f8;border:1px solid #ddd;border-radius:6px;padding:12px;overflow:auto}
</style>
</head>
<body>
<h1>CAL CLI Matrix</h1>
<pre>{{ARTIFACT_JSON}}</pre>
<div class="cards">
{{SUMMARY_CARDS}}
</div>
<table>
<thead><tr><th>CLI</th><th>Capability</th><th>Verifier</th><th>Probe</th><th>Promotion</th><th>Reuse</th><th>Failure</th><th>Duration</th></tr></thead>
<tbody>
{{CASE_ROWS}}
</tbody>
</table>
</body>
</html>
